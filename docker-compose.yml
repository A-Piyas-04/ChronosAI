# version: "3.9"

services:
  backend:
    build: ./backend
    container_name: chronos_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - chronos_net

  db:
    image: postgres:16-alpine
    container_name: chronos_db
    environment:
      POSTGRES_USER: chronos_user
      POSTGRES_PASSWORD: chronos_pass
      POSTGRES_DB: chronos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos_user -d chronos_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chronos_net

  redis:
    image: redis:7-alpine
    container_name: chronos_redis
    ports:
      - "6379:6379"
    networks:
      - chronos_net

  celery_worker:
    build: ./backend
    container_name: chronos_worker
    command: >
      celery -A app.workers.celery_app:celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=calendar_sync,schedule_generation
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - chronos_net
    restart: unless-stopped

  celery_beat:
    build: ./backend
    container_name: chronos_beat
    command: >
      celery -A app.workers.celery_app:celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
      --schedule /tmp/celerybeat-schedule
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    networks:
      - chronos_net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: chronos_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - chronos_net

volumes:
  postgres_data:

networks:
  chronos_net:
    driver: bridge
